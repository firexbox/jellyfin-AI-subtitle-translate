<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title id="pageTitle">Jellyfin 双语字幕设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
      background: #0f0f1a;
      color: #ddd;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #888; font-size: 14px; }

    .card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #eee;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: #667eea;
    }
    select.form-control {
      cursor: pointer;
    }
    .form-text {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      margin-left: 8px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }

    .actions {
      display: flex;
      align-items: center;
      margin-top: 8px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .alert-success {
      background: rgba(74,222,128,0.1);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.2);
    }
    .alert-error {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.2);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-label { font-size: 14px; }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch.active { background: #667eea; }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 20px; height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.active::after { transform: translateX(20px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="settingsTitle">Jellyfin 双语字幕设置</h1>
      <p>配置 AI 翻译提供商和字幕显示选项</p>
    </div>

    <div class="card">
      <div class="card-title">AI 翻译提供商</div>
      <div class="form-group">
        <label for="provider">提供商</label>
        <select class="form-control" id="provider">
          <option value="openai">OpenAI</option>
          <option value="gemini">Google Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="custom">自定义 API</option>
        </select>
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" class="form-control" id="apiKey" placeholder="输入你的 API Key">
        <div class="form-text">在对应平台获取 API Key，仅存储在本地浏览器</div>
      </div>
      <div class="form-group" id="apiUrlGroup" style="display:none">
        <label for="apiUrl">自定义 API 基础 URL</label>
        <input type="text" class="form-control" id="apiUrl" placeholder="https://api.example.com/v1">
      </div>
      <div class="form-group">
        <label for="model">模型</label>
        <select class="form-control" id="model">
          <option value="">默认</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="testBtn">测试连接</button>
      </div>
      <div class="alert" id="testAlert"></div>
    </div>

    <div class="card">
      <div class="card-title">翻译设置</div>
      <div class="form-group">
        <label for="targetLang">目标语言</label>
        <select class="form-control" id="targetLang">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="en">English</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="ru">Russian</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title">显示设置</div>
      <div class="form-group">
        <label for="position">翻译字幕位置</label>
        <select class="form-control" id="position">
          <option value="top">顶部 (原文底部)</option>
          <option value="bottom">底部 (原文顶部)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="fontSize">字体大小 (px)</label>
        <input type="number" class="form-control" id="fontSize" value="20" min="10" max="60">
      </div>
      <div class="toggle-row">
        <span class="toggle-label">启用扩展</span>
        <div class="toggle-switch" id="enabledToggle"></div>
      </div>
    </div>

    <div class="actions" style="margin-top: 24px;">
      <button class="btn btn-primary" id="saveBtn">保存设置</button>
    </div>
    <div class="alert" id="saveAlert"></div>
  </div>

  <script src="../lib/ai-providers.js"></script>
  <script src="options.js"></script>
</body>
</html>
